<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes App</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <section class="card form-card">
        <h1>Notes App</h1>
        <p class="subtitle">Tambah, edit, dan hapus catatan kamu</p>

        <form id="noteForm">
          <input type="hidden" id="noteId" />

          <div class="field">
            <label for="judul">Judul</label>
            <input id="judul" name="judul" type="text" placeholder="Contoh: Rencana Mingguan" required />
          </div>

          <div class="field">
            <label for="isi">Isi</label>
            <textarea id="isi" name="isi" rows="5" placeholder="Tulis catatan kamu di sini..." required></textarea>
          </div>

          <div class="actions">
            <button type="submit" id="submitButton">Simpan Catatan</button>
            <button type="button" id="cancelEdit" class="secondary hidden">Batal Edit</button>
          </div>
        </form>
      </section>

      <section class="card list-card">
        <div class="list-head">
          <h2>Daftar Catatan</h2>
          <button id="refreshButton" class="secondary">Refresh</button>
        </div>
        <div id="status" class="status" aria-live="polite"></div>
        <div id="notesList" class="notes-list"></div>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
